[db]
port = 54322
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true
port = 54323
ip_version = "ipv4"

[studio]
enabled = true
port = 54323
api_url = "http://localhost:54321"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
port = 54321
file_size_limit = "50MiB"

[analytics]
enabled = false
port = 54327
vector_port = 54328

[functions]
enabled = true
verify_jwt = false

[edge_runtime]
enabled = true
ip_version = "ipv4"
port = 54321
worker_count = 1
wall_clock_limit = 150000
cpu_time_limit = 150000
memory_limit = 150000000

